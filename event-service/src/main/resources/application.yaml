spring:
  application:
    name: event-service
  profiles:
    active: local
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  redis:
    host: localhost
    port: 6379
logging:
  level:
    liquibase: INFO