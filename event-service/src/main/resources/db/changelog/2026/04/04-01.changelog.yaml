databaseChangeLog:
  - changeSet:
      id: 20260404-144900
      author: bachev
      changes:
        - createTable:
            tableName: event_status
            columns:
              - column:
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_event_status_id
                    unique: true
                  name: id
                  type: VARCHAR(32)
              - column:
                  name: description
                  type: VARCHAR(64)
        - insert:
            tableName: event_status
            columns:
              - column:
                  name: id
                  type: VARCHAR(32)
                  value: "ACTIVE"
              - column:
                  name: description
                  value: "Event is active"
        - insert:
            tableName: event_status
            columns:
              - column:
                  name: id
                  type: VARCHAR(32)
                  value: "CANCELLED"
              - column:
                  name: description
                  value: "Event is canceled"
        - insert:
            tableName: event_status
            columns:
              - column:
                  name: id
                  type: VARCHAR(32)
                  value: "SOLD_OUT"
              - column:
                  name: description
                  value: "Event is sold out"
  - changeSet:
      id: 20260404-150000
      author: bachev
      changes:
        - createTable:
            tableName: event_category
            columns:
              - column:
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_event_category_id
                    unique: true
                  name: id
                  type: VARCHAR(32)
        - insert:
            tableName: event_category
            columns:
              - column:
                  name: id
                  type: VARCHAR(32)
                  value: "MUSIC"
        - insert:
            tableName: event_category
            columns:
              - column:
                  name: id
                  type: VARCHAR(32)
                  value: "SPORTS"
        - insert:
            tableName: event_category
            columns:
              - column:
                  name: id
                  type: VARCHAR(32)
                  value: "THEATRE"
        - insert:
            tableName: event_category
            columns:
              - column:
                  name: id
                  type: VARCHAR(32)
                  value: "CONFERENCE"
        - insert:
            tableName: event_category
            columns:
              - column:
                  name: id
                  type: VARCHAR(32)
                  value: "COMEDY"
        - insert:
            tableName: event_category
            columns:
              - column:
                  name: id
                  type: VARCHAR(32)
                  value: "ARTS"
        - insert:
            tableName: event_category
            columns:
              - column:
                  name: id
                  type: VARCHAR(32)
                  value: "FOOD"
        - insert:
            tableName: event_category
            columns:
              - column:
                  name: id
                  type: VARCHAR(32)
                  value: "OUTDOOR"
  - changeSet:
      id: 20260404-150900
      author: bachev
      changes:
        - createTable:
            tableName: event
            columns:
              - column:
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_event_id
                    unique: true
                  name: id
                  type: UUID
              - column:
                  name: name
                  type: VARCHAR(512)
              - column:
                  name: description
                  type: VARCHAR(4000)
              - column:
                  name: category
                  type: VARCHAR(32)
                  constraints:
                    foreignKeyName: fk__event_to__event_category_id
                    referencedColumnNames: id
                    referencedTableName: event_category
              - column:
                  name: location
                  type: varchar(128)
              - column:
                  name: event_date
                  type: TIMESTAMPTZ
              - column:
                  name: price
                  type: BIGINT
              - column:
                  name: total_tickets
                  type: INT
              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    foreignKeyName: fk__event_to__event_status_id
                    referencedColumnNames: id
                    referencedTableName: event_status
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
  - changeSet:
      id: 20260404-173400
      author: bachev
      changes:
        - addUniqueConstraint:
            tableName: event
            columnNames: name, event_date
            constraintName: uq__event__name_event_date